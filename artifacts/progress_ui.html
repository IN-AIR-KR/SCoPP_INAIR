<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SCoPP 구현 진행상황</title><style>:root{color-scheme:dark;--bg:#070b16;--panel:#10182a;--line:#24304a;--text:#eff5ff;--muted:#8795b2;--green:#5eead4;--blue:#60a5fa;--amber:#fbbf24}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 90% -10%,#16355a 0,transparent 35%),var(--bg);color:var(--text);font:14px/1.5 system-ui,sans-serif}header{max-width:1200px;margin:auto;padding:34px 24px 20px;display:flex;justify-content:space-between;align-items:end}h1{font-size:34px;margin:4px 0}header p{color:var(--muted);margin:0}.eyebrow,.heading span{font-size:11px;letter-spacing:.15em;color:var(--green);font-weight:800}.commit{font-family:monospace;color:#b9c8e6;background:#10192c;border:1px solid var(--line);padding:8px 11px;border-radius:8px}main{max-width:1200px;margin:auto;padding:0 24px 40px;display:grid;gap:14px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat,.panel{background:linear-gradient(145deg,#111b2f,#0d1424);border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 35px #0004}.stat{padding:16px}.stat b{font-size:25px;display:block}.stat small{color:var(--muted)}.panel{padding:18px}.heading{display:flex;justify-content:space-between;align-items:end;margin-bottom:16px}.heading h2{font-size:18px;margin:2px 0}.heading>b{color:var(--green)}.pipeline{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.stage{position:relative;padding:14px 10px;background:#0b1323;border:1px solid #273653;border-radius:10px;min-height:102px}.stage.done{border-color:#27685f}.stage .num{font:11px monospace;color:var(--muted)}.stage b{display:block;margin:8px 0 2px}.stage small{color:var(--muted)}.check{position:absolute;right:8px;top:8px;color:var(--green)}.columns{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}.profile{display:grid;grid-template-columns:150px 1fr 65px;gap:10px;align-items:center;margin:11px 0}.bar{height:10px;background:#25324b;border-radius:8px;overflow:hidden}.bar i{height:100%;display:block;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:8px}.profile small{color:var(--muted)}.links{display:grid;gap:8px}.links a{display:flex;justify-content:space-between;padding:11px;text-decoration:none;color:var(--text);background:#0b1323;border:1px solid #273653;border-radius:9px}.links a:hover{border-color:var(--green)}.next{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.next-item{padding:13px;background:#0b1323;border:1px solid #273653;border-radius:10px}.next-item b{color:var(--amber)}.next-item p{color:var(--muted);margin:5px 0 0}@media(max-width:900px){.pipeline{grid-template-columns:repeat(2,1fr)}.columns{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.next{grid-template-columns:1fr}} 
</style></head><body>
<header><div><span class="eyebrow">GMALLOC · INDOOR SCoPP</span><h1>논문 구현 진행상황</h1><p>논문 재현 범위, 검증 결과와 다음 작업을 한 화면에서 확인합니다.</p></div><div class="commit" id="commit"></div></header>
<main><section class="stats" id="stats"></section><section class="panel"><div class="heading"><div><span>PIPELINE</span><h2>핵심 구현 단계</h2></div><b id="completion"></b></div><div class="pipeline" id="pipeline"></div></section>
<div class="columns"><section class="panel"><div class="heading"><div><span>COMPARISON</span><h2>Clustering profile 비교</h2></div></div><div id="profiles"></div></section><section class="panel"><div class="heading"><div><span>DELIVERABLES</span><h2>확인 가능한 산출물</h2></div></div><div class="links" id="links"></div></section></div>
<section class="panel"><div class="heading"><div><span>NEXT</span><h2>다음 구현 후보</h2></div></div><div class="next" id="next"></div></section></main>
<script>const D={"commit": "f0e80ab", "tests": 44, "pythonFiles": 26, "cellCount": 109, "profiles": [{"name": "deterministic_lloyd", "cells": [26, 28, 28, 27], "makespan": 37.723225167056036}, {"name": "official_minibatch", "cells": [23, 38, 19, 29], "makespan": 50.655871196903654}], "stages": [{"name": "지도 모델", "detail": "AOI·no-fly·Shapely", "status": "done"}, {"name": "격자화", "detail": "FoV 기반 cell", "status": "done"}, {"name": "Clustering", "detail": "Lloyd·MiniBatch", "status": "done"}, {"name": "경매", "detail": "Conflict 해결", "status": "done"}, {"name": "CPP", "detail": "Nearest neighbor", "status": "done"}, {"name": "평가", "detail": "Makespan·확장성", "status": "done"}, {"name": "UI", "detail": "경로 이동 재생", "status": "done"}], "links": [{"name": "경로 이동 UI", "href": "path_ui.html"}, {"name": "공식 Profile UI", "href": "official_path_ui.html"}, {"name": "Profile 비교 JSON", "href": "profile_comparison.json"}, {"name": "확장성 그래프", "href": "indoor_scaling.png"}, {"name": "README", "href": "../README.md"}], "next": [{"name": "경로 성능", "detail": "동적 삭제 없는 KD-tree 탐색 병목을 개선합니다."}, {"name": "장애물 회피", "detail": "Cell 방문 순서를 실제 충돌 없는 이동 경로로 연결합니다."}, {"name": "실기체 연동", "detail": "시뮬레이터 검증 후 실험실 제어 어댑터를 추가합니다."}]};</script><script>document.querySelector('#commit').textContent=`main · ${D.commit}`;
const stats=[['테스트',`${D.tests} passed`],['Python 파일',D.pythonFiles],['유효 Cell',D.cellCount],['구현 Profile',D.profiles.length]];
document.querySelector('#stats').innerHTML=stats.map(x=>`<article class="stat"><b>${x[1]}</b><small>${x[0]}</small></article>`).join('');
const done=D.stages.filter(x=>x.status==='done').length;document.querySelector('#completion').textContent=`${done}/${D.stages.length} 완료`;
document.querySelector('#pipeline').innerHTML=D.stages.map((x,i)=>`<article class="stage ${x.status}"><span class="num">0${i+1}</span>${x.status==='done'?'<span class="check">●</span>':''}<b>${x.name}</b><small>${x.detail}</small></article>`).join('');
const max=Math.max(...D.profiles.map(x=>x.makespan));document.querySelector('#profiles').innerHTML=D.profiles.map(x=>`<div class="profile"><div><b>${x.name}</b><br><small>${x.cells.join(' / ')} cells</small></div><div class="bar"><i style="width:${x.makespan/max*100}%"></i></div><b>${x.makespan.toFixed(2)}m</b></div>`).join('');
document.querySelector('#links').innerHTML=D.links.map(x=>`<a href="${x.href}"><span>${x.name}</span><b>열기 ↗</b></a>`).join('');
document.querySelector('#next').innerHTML=D.next.map((x,i)=>`<article class="next-item"><b>0${i+1} · ${x.name}</b><p>${x.detail}</p></article>`).join('');
</script></body></html>
